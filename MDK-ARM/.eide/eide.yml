version: "4.1"
name: IORemap
type: ARM
deviceName: null
packDir: null
srcDirs: []
virtualFolder:
  name: <virtual_root>
  files: []
  folders:
    - name: STARTUP
      files:
        - path: ../../../../../../firmware/CMSIS/device/startup/startup_n32g430.s
      folders: []
    - name: CMSIS
      files:
        - path: ../../../../../../firmware/CMSIS/device/system_n32g430.c
      folders: []
    - name: FWLB
      files:
        - path: ../../../../../../firmware/n32g430_std_periph_driver/src/n32g430_gpio.c
        - path: ../../../../../../firmware/n32g430_std_periph_driver/src/n32g430_rcc.c
      folders: []
    - name: USER
      files:
        - path: ../src/main.c
        - path: ../src/n32g430_it.c
        - path: ../src/bsp_led.c
        - path: ../src/bsp_key.c
        - path: ../src/bsp_JTAG.c
      folders: []
    - name: DOC
      files:
        - path: ../readme.txt
      folders: []
dependenceList: []
outDir: build
miscInfo:
  uid: 724c8635dd74efe6fa7b831147706877
targets:
  N32G430:
    cppPreprocessAttrs:
      defineList:
        - N32G430
        - USE_STDPERIPH_DRIVER
      incList:
        - ../inc
        - ../../../../../../firmware/CMSIS/core
        - ../../../../../../firmware/CMSIS/device
        - ../../../../../../firmware/n32g430_std_periph_driver/inc
        - .cmsis/include
        - RTE/_N32G430
      libList: []
    excludeList: []
    settings: {}
    toolchain: AC5
    toolchainConfigMap:
      AC5:
        archExtensions: ""
        cpuType: Cortex-M4
        floatingPointHardware: single
        options:
          version: 4
          afterBuildTasks:
            - name: "[Copy linker output for Keil User Commands]"
              abortAfterFailed: true
              command: mkdir ${KEIL_OUTPUT_DIR} & copy "${OutDir}\${ProjectName}.axf" "${KEIL_OUTPUT_DIR}\${ProjectName}.axf"
              disable: false
            - name: fromelf --bin --output=.\bin\IORemap.bin .\Objects\IORemap.axf
              abortAfterFailed: true
              command: fromelf --bin --output=.\bin\IORemap.bin .\Objects\IORemap.axf
              disable: false
          asm-compiler:
            defines: []
          beforeBuildTasks: []
          c/cpp-compiler:
            CXX_FLAGS: --diag_suppress=1 --diag_suppress=1295
            C_FLAGS: --diag_suppress=1 --diag_suppress=1295
            c99-mode: true
            one-elf-section-per-function: true
            optimization: level-0
            warnings: all-warnings
          global:
            output-debug-info: enable
            use-microLIB: true
          linker:
            $outputTaskExcludes:
              - .bin
            output-format: elf
            ro-base: "0x00000000"
            rw-base: "0x20000000"
            xo-base: ""
        scatterFilePath: ""
        storageLayout:
          RAM:
            - id: 1
              isChecked: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              noInit: false
              tag: RAM
            - id: 2
              isChecked: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              noInit: false
              tag: RAM
            - id: 3
              isChecked: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              noInit: false
              tag: RAM
            - id: 1
              isChecked: true
              mem:
                size: "0x4000"
                startAddr: "0x20000000"
              noInit: false
              tag: IRAM
            - id: 2
              isChecked: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              noInit: false
              tag: IRAM
          ROM:
            - id: 1
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: ROM
            - id: 2
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: ROM
            - id: 3
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: ROM
            - id: 1
              isChecked: true
              isStartup: true
              mem:
                size: "0x10000"
                startAddr: "0x8000000"
              tag: IROM
            - id: 2
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: IROM
        useCustomScatterFile: false
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: "null"
          vendor: "null"
        otherCmds: ""
        proType: 1
        speed: 8000
    uploader: JLink
